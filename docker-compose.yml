version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    container_name: erapor_backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    environment:
      - FLASK_APP=manage.py
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - DATABASE_URL=mysql+mysqldb://root:rootpassword@db:3306/erapor_sd
      - SECRET_KEY=dev_secret_key_change_me
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: erapor_db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=erapor_sd
      - TZ=Asia/Jakarta
    volumes:
      - db_data:/var/lib/mysql
      - ./infra/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
